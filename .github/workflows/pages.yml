name: Pages Deploy
on:
  push:
    branches: ["main"]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: ci
  cancel-in-progress: false
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.publish.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Finalize
        env:
          AD8192: ${{ secrets.AD8192 }}
          BA9AA1: ${{ secrets.BA9AA1 }}
        run: |
          python3 -c "
          import os, pathlib, sys
          gm = os.environ.get('AD8192', '')
          bm = os.environ.get('BA9AA1', '')
          p = pathlib.Path('index.html')
          s = s2 = p.read_text(encoding='utf-8')
          if gm:
              s2 = s2.replace('<!-- 5746c66fdf3e498b16e7fa5e1c5106e19a226cfdee -->', gm)
          if bm:
              s2 = s2.replace('<!-- fe546c9c7a41f87837c39128a9 -->', bm)
          if s2 == s and (gm or bm):
              sys.exit(1)
          if s2 != s:
              p.write_text(s2, encoding='utf-8')
          "
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: publish
        uses: actions/deploy-pages@v4
